<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 72 72" fill="none">
  <!-- outer ring -->
  <circle cx="36" cy="36" r="33" stroke="#006242" stroke-width="1.6"/>

  <!-- building body -->
  <rect x="17" y="34" width="38" height="24" rx="1.5"
        fill="#EBF5EF" stroke="#006242" stroke-width="1.3"/>

  <!-- roof / gable -->
  <path d="M12 34 L36 20 L60 34 Z"
        fill="#EBF5EF" stroke="#006242" stroke-width="1.3" stroke-linejoin="round"/>

  <!-- roof peak marker -->
  <rect x="33.5" y="15" width="5" height="6" rx="0.5" fill="#006242"/>

  <!-- left window -->
  <rect x="20" y="38" width="9" height="8" rx="1"
        stroke="#006242" stroke-width="1.1" fill="none"/>

  <!-- right window -->
  <rect x="43" y="38" width="9" height="8" rx="1"
        stroke="#006242" stroke-width="1.1" fill="none"/>

  <!-- arched door -->
  <path d="M30 58 L30 48 Q30 42 36 42 Q42 42 42 48 L42 58 Z"
        stroke="#006242" stroke-width="1.2" fill="none"/>

  <!-- Starbucks logo circle badge on door -->
  <circle cx="36" cy="40" r="4.5" fill="#EBF5EF" stroke="#006242" stroke-width="1.1"/>
  <!-- mini star inside badge -->
  <path d="M36 36.5 L36.8 38.9 L39.4 38.9 L37.3 40.4 L38.1 42.8 L36 41.3 L33.9 42.8 L34.7 40.4 L32.6 38.9 L35.2 38.9 Z"
        fill="#006242" opacity="0.75"/>

  <!-- 4-point sparkle — top right -->
  <path d="M54 13 L55.4 17 L59.5 18 L55.4 19 L54 23 L52.6 19 L48.5 18 L52.6 17 Z"
        fill="#006242"/>

  <!-- smaller sparkle — left -->
  <path d="M14 26 L15 28.8 L18 30 L15 31.2 L14 34 L13 31.2 L10 30 L13 28.8 Z"
        fill="#006242" opacity="0.7"/>

  <!-- tiny dot accent -->
  <circle cx="58" cy="28" r="1.8" fill="#006242" opacity="0.5"/>
  <circle cx="13" cy="19" r="1.2" fill="#006242" opacity="0.4"/>
</svg>

        fill="#006242" fill-opacity="0.12" stroke="#006242" stroke-width="1.2"/>

  <!-- bottom bun -->
  <path d="M17 52 L55 52 Q55 62 36 62 Q17 62 17 52 Z"
        fill="#EBF5EF" stroke="#006242" stroke-width="1.4"/>

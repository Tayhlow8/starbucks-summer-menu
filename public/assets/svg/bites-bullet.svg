  <ellipse cx="36" cy="32" rx="2.5" ry="1.3" fill="#006242" opacity="0.45"/>
  <ellipse cx="45" cy="35" rx="2.5" ry="1.3" fill="#006242" opacity="0.45" transform="rotate(25 45 35)"/>

  <!-- wavy lettuce layer -->
  <path d="M16 44 Q19.5 40 23 44 Q26.5 40 30 44 Q33.5 40 36 44 Q38.5 40 42 44 Q45.5 40 49 44 Q52.5 40 56 44 L56 47 L16 47 Z"
